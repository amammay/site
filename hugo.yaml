baseURL: https://mammay.dev/
languageCode: en-us
title: Alex Mammay
theme: [ "PaperMod" ]

enableEmoji: true
enableRobotsTXT: true
enableInlineShortcodes: true

menu:
  main:
    - identifier: resume
      name: Resume
      url: resume/
      weight: 10
    - identifier: posts
      name: Blog
      url: posts/
      weight: 30
    - identifier: search
      name: Search
      url: search/
      weight: 40
    - identifier: archives
      name: Archives
      url: archives/
      weight: 50

params:
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowShareButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  defaultTheme: auto
  ShareButtons: [ "twitter", "facebook", "linkedin", "reddit", "ycombinator" ]

  homeInfoParams:
    Title: "Alex Mammay :wave:"
    Content: >
      Senior Software Engineer specialized in Go, Protocol Buffers, gRPC, Docker, and building high-performance backend systems. Welcome to my personal site and blog.

  socialIcons:
    - name: github
      url: https://github.com/amammay
    - name: linkedin
      url: https://www.linkedin.com/in/alex-mammay-7a969ba6/

  editPost:
    URL: "https://github.com/amammay/site/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

caches:
  images:
    dir: :cacheDir/images

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
